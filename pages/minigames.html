    function startRunner() {
      const game = GAMES.runner;
      document.getElementById('playView').innerHTML = `
        <div class="play-layout">
          <section id="runnerArena" class="arena runner-stage">
            ${stageNav()}
            ${coachBadge(game)}
            <div class="runner-horizon">NUMBER RUN</div>
            <div class="runner-floor"></div>
            <div class="runner-road-lines"></div>
            <div id="runnerBoss" class="runner-boss">
              <div class="boss-name">FINAL BOSS</div>
              <div class="boss-hpbar"><div id="bossHpFill" class="boss-hpfill"></div></div>
              <div id="bossHpText" class="boss-hptext">HP 440 / 440</div>
            </div>
            <div class="gesture">左右を瞬間判断</div>
            <div id="powerBubble" class="power-bubble">12</div>
            <img id="runnerPlayer" class="runner-player" src="${SPRITE}idol-run.png" alt="" />
            ${renderHud(game.name, [
              { label: 'POWER', id: 'runnerPower', value: '12' },
              { label: 'ROUND', id: 'runnerRound', value: '0/10' },
              { label: 'BOSS', id: 'runnerBossHp', value: '440' },
              { label: 'BEST', id: 'runnerBest', value: String(loadScores().runner || 0) }
            ], '左右どちらの計算が強いか、一瞬で選ぶ。', game.assets)}
          </section>
        </div>
      `;
      const arena = document.getElementById('runnerArena');
      const player = document.getElementById('runnerPlayer');
      const bubble = document.getElementById('powerBubble');
      const boss = document.getElementById('runnerBoss');
      const bossFill = document.getElementById('bossHpFill');
      const bossText = document.getElementById('bossHpText');
      const lanes = [30, 70];
      const bossHp = 440;
      const gatePlan = [
        [{ type: 'add', value: 16 }, { type: 'mul', value: 1.80 }],
        [{ type: 'add', value: 18 }, { type: 'mul', value: 1.70 }],
        [{ type: 'add', value: 20 }, { type: 'mul', value: 1.55 }],
        [{ type: 'add', value: 26 }, { type: 'mul', value: 1.45 }],
        [{ type: 'add', value: 31 }, { type: 'mul', value: 1.38 }],
        [{ type: 'add', value: 38 }, { type: 'mul', value: 1.32 }],
        [{ type: 'add', value: 45 }, { type: 'mul', value: 1.28 }],
        [{ type: 'add', value: 52 }, { type: 'mul', value: 1.25 }],
        [{ type: 'add', value: 60 }, { type: 'mul', value: 1.22 }],
        [{ type: 'add', value: 72 }, { type: 'mul', value: 1.20 }]
      ];
      let lane = 0;
      let power = 12;
      let round = 0;
      let currentGate = null;
      let gateY = -140;
      let active = false;
      let last = performance.now();
      let raf = 0;
      let finished = false;
      let bestChoiceCount = 0;

      function render() {
        player.style.left = `calc(${lanes[lane]}% - ${player.offsetWidth / 2}px)`;
        player.src = lane === 0 ? `${SPRITE}idol-left.png` : `${SPRITE}idol-right.png`;
        bubble.style.left = `${lanes[lane]}%`;
        bubble.textContent = power;
        document.getElementById('runnerPower').textContent = power;
        document.getElementById('runnerRound').textContent = `${round}/${gatePlan.length}`;
        document.getElementById('runnerBossHp').textContent = bossHp;
        document.getElementById('runnerBest').textContent = loadScores().runner || 0;
        arena.classList.toggle('fever', power >= bossHp);
        if (currentGate) {
          currentGate.nodes.forEach((node, index) => node.classList.toggle('selected', index === lane));
        }
      }

      function setLaneFromPointer(event) {
        if (!active || finished) return;
        const rect = arena.getBoundingClientRect();
        const x = event.clientX - rect.left;
        lane = x < rect.width / 2 ? 0 : 1;
        render();
      }

      function opLabel(op) {
        return op.type === 'add' ? `+${op.value}` : `×${op.value.toFixed(2).replace(/0$/, '')}`;
      }

      function applyOp(base, op) {
        return op.type === 'add' ? base + op.value : Math.floor(base * op.value);
      }

      function setStatus(text) {
        document.getElementById('gameStatus').textContent = text;
      }

      function shufflePair(pair, index) {
        const copy = pair.map(op => ({ ...op }));
        return index % 2 === 0 ? copy : [copy[1], copy[0]];
      }

      function spawnGate() {
        if (round >= gatePlan.length) {
          startBoss();
          return;
        }
        const pair = shufflePair(gatePlan[round], round);
        const pairNode = document.createElement('div');
        pairNode.className = 'gate-pair';
        const nodes = pair.map((op, index) => {
          const node = document.createElement('div');
          const next = applyOp(power, op);
          node.className = 'math-gate';
          node.style.left = `${lanes[index]}%`;
          node.innerHTML = `<strong>${opLabel(op)}</strong><span>${power} → ${next}</span>`;
          pairNode.appendChild(node);
          return node;
        });
        arena.appendChild(pairNode);
        gateY = -128;
        currentGate = { node: pairNode, ops: pair, nodes };
        setStatus('左右どちらがPOWERを伸ばすか選んで。');
        render();
      }

      function resolveGate() {
        if (!currentGate) return;
        const op = currentGate.ops[lane];
        const options = currentGate.ops.map(choice => applyOp(power, choice));
        const oldPower = power;
        const nextPower = applyOp(power, op);
        if (nextPower >= Math.max(...options)) bestChoiceCount += 1;
        power = nextPower;
        round += 1;
        currentGate.node.remove();
        currentGate = null;
        bubble.classList.remove('pop');
        void bubble.offsetWidth;
        bubble.classList.add('pop');
        pulseArena(arena, 'combo-pulse');
        floatText(arena, `${oldPower} → ${power}`, lanes[lane], 48, 'good');
        setStatus(`${opLabel(op)} を選択。POWER ${power}`);
        render();
        window.setTimeout(spawnGate, 360);
      }

      function startBoss() {
        if (finished) return;
        active = false;
        finished = true;
        cancelAnimationFrame(raf);
        boss.classList.add('show');
        bossFill.style.width = '100%';
        bossText.textContent = `HP ${bossHp} / ${bossHp}`;
        setStatus('FINAL BOSS。POWERで攻撃。');
        window.setTimeout(() => {
          const remain = Math.max(0, bossHp - power);
          const percent = Math.max(0, Math.round((remain / bossHp) * 100));
          bossFill.style.width = `${percent}%`;
          bossText.textContent = `HP ${remain} / ${bossHp}`;
          pulseArena(arena, power >= bossHp ? 'combo-pulse' : 'miss-shake', power >= bossHp ? 520 : 320);
          window.setTimeout(finish, 780);
        }, 650);
      }

      function finish() {
        const score = power;
        const rank = power >= bossHp * 1.08 ? 'PERFECT' : power >= bossHp ? 'GREAT' : power >= bossHp * 0.88 ? 'GOOD' : 'MISS';
        saveScore('runner', score);
        const today = recordPlay('runner', score, rank);
        setStatus(power >= bossHp ? 'BOSS撃破。判断勝ち。' : 'BOSS残存。もっと効率のいい選択を狙う。');
        showResult(arena, {
          gameKey: 'runner',
          rank,
          sprite: game.chibi,
          lines: [`POWER ${power}`, `BOSS HP ${bossHp}`, `BEST CHOICE ${bestChoiceCount}/${gatePlan.length}`, `TODAY BEST ${today.best}`]
        });
      }

      arena.addEventListener('pointerdown', setLaneFromPointer);
      arena.addEventListener('pointermove', event => {
        if (event.buttons || event.pointerType === 'touch') setLaneFromPointer(event);
      });
      render();
      showLessonStart(arena, 'LESSON START!', game.name, () => {
        active = true;
        last = performance.now();
        spawnGate();
        raf = requestAnimationFrame(tick);
      });

      function tick(now) {
        if (!active || finished) return;
        const delta = Math.min(48, now - last);
        last = now;
        if (currentGate) {
          gateY += delta * 0.24;
          currentGate.node.style.top = `${gateY}px`;
          currentGate.nodes.forEach((node, index) => node.classList.toggle('selected', index === lane));
          if (gateY > arena.clientHeight - 240) resolveGate();
        }
        raf = requestAnimationFrame(tick);
      }

      cleanupGame = () => {
        active = false;
        finished = true;
        cancelAnimationFrame(raf);
        currentGate?.node.remove();
      };
    }

    function startJump() {
      const game = GAMES.jump;
      const jumpAsset = '../assets/minigames/jump/';
      document.getElementById('playView').innerHTML = `
        <div class="play-layout">
          <section id="jumpArena" class="arena jump-stage">
            ${stageNav()}
            ${coachBadge(game)}
            <div class="jump-warning">長押しで高く跳ぶ</div>
            <div class="jump-charge"><div id="jumpChargeFill" class="jump-charge-fill"></div></div>
            <img id="jumpPlayer" class="jump-player" src="${jumpAsset}jump-run-a.png" alt="" />
            ${renderHud(game.name, [
              { label: 'DIST', id: 'jumpDistance', value: '0' },
              { label: 'LIFE', id: 'jumpLife', value: '3' },
              { label: 'SPEED', id: 'jumpSpeed', value: '1.0' },
              { label: 'JUMP', id: 'jumpCount', value: '0' }
            ], '押す長さで高さを変えて、障害物を越える。', game.assets)}
          </section>
        </div>
      `;

      const arena = document.getElementById('jumpArena');
      const player = document.getElementById('jumpPlayer');
      const chargeFill = document.getElementById('jumpChargeFill');
      const groundBottom = 72;
      const finishDistance = 620;
      const obstacles = [
        { src: `${jumpAsset}jump-obstacle-hurdle.png`, width: 104, mobileWidth: 86, clear: 54, label: 'LOW' },
        { src: `${jumpAsset}jump-obstacle-roller.png`, width: 122, mobileWidth: 96, clear: 86, label: 'MID' },
        { src: `${jumpAsset}jump-obstacle-blocks.png`, width: 128, mobileWidth: 102, clear: 132, label: 'HIGH' },
        { src: `${jumpAsset}jump-obstacle-roller.png`, width: 142, mobileWidth: 110, clear: 108, label: 'LONG' }
      ];
      let active = false;
      let ended = false;
      let last = performance.now();
      let distance = 0;
      let life = 3;
      let jumps = 0;
      let y = 0;
      let vy = 0;
      let hold = false;
      let holdMs = 0;
      let grounded = true;
      let runFrame = 0;
      let spawnClock = 0;
      let spawnGap = 920;
      let speed = 0.38;
      let tickTimer = 0;
      let obstacleNodes = [];

      function setStatus(text) {
        document.getElementById('gameStatus').textContent = text;
      }

      function setHud() {
        document.getElementById('jumpDistance').textContent = `${Math.floor(distance)}m`;
        document.getElementById('jumpLife').textContent = life;
        document.getElementById('jumpSpeed').textContent = `${(speed / 0.38).toFixed(1)}`;
        document.getElementById('jumpCount').textContent = jumps;
      }

      function startPress(event) {
        if (!active || ended || event.target.closest('[data-action]')) return;
        hold = true;
        holdMs = 0;
        if (grounded) {
          grounded = false;
          vy = 9.2;
          jumps += 1;
          player.src = `${jumpAsset}jump-jump.png`;
          setStatus('長押しで高度を伸ばす。離すと早く落ちる。');
        }
        setHud();
      }

      function endPress() {
        hold = false;
        holdMs = 0;
      }

      function spawnObstacle() {
        const obstacle = obstacles[Math.floor(Math.random() * obstacles.length)];
        const img = document.createElement('img');
        img.className = 'jump-obstacle';
        img.src = obstacle.src;
        img.dataset.clear = String(obstacle.clear);
        img.dataset.label = obstacle.label;
        img.dataset.hit = 'false';
        img.dataset.passed = 'false';
        img.dataset.x = String(arena.clientWidth + 80);
        img.style.setProperty('--obstacle-w', `${obstacle.width}px`);
        img.style.setProperty('--obstacle-w-mobile', `${obstacle.mobileWidth}px`);
        img.style.left = `${arena.clientWidth + 80}px`;
        arena.appendChild(img);
        obstacleNodes.push(img);
        setStatus(`${obstacle.label} 障害物。高さを見てジャンプ。`);
      }

      function playerBounds() {
        const r = player.getBoundingClientRect();
        const a = arena.getBoundingClientRect();
        return {
          left: r.left - a.left + r.width * 0.26,
          right: r.right - a.left - r.width * 0.22
        };
      }

      function finish(forceRank = '') {
        if (ended) return;
        ended = true;
        active = false;
        clearTimeout(tickTimer);
        window.removeEventListener('pointerup', endPress);
        window.removeEventListener('pointercancel', endPress);
        obstacleNodes.forEach(node => node.remove());
        obstacleNodes = [];
        const score = Math.max(0, Math.floor(distance + life * 120));
        const rank = forceRank || (distance >= finishDistance && life === 3 ? 'PERFECT' : distance >= finishDistance ? 'GREAT' : distance >= finishDistance * 0.68 ? 'GOOD' : 'MISS');
        saveScore('jump', score);
        const today = recordPlay('jump', score, rank);
        showResult(arena, {
          gameKey: 'jump',
          rank,
          sprite: game.chibi,
          lines: [`DIST ${Math.floor(distance)}m`, `LIFE ${life}`, `JUMP ${jumps}`, `TODAY BEST ${today.best}`]
        });
      }

      function tick(now) {
        if (!active || ended) return;
        const delta = Math.min(48, now - last);
        last = now;
        distance += delta * 0.018 * (speed / 0.38);
        speed = Math.min(0.58, speed + delta * 0.000015);
        spawnClock += delta;

        if (hold && !grounded) {
          holdMs = Math.min(420, holdMs + delta);
          if (holdMs < 340 && y < 210) vy += 0.28;
          chargeFill.style.width = `${Math.round((holdMs / 340) * 100)}%`;
        } else {
          chargeFill.style.width = '0%';
        }

        if (!grounded) {
          y += vy;
          vy -= 0.47;
          if (y <= 0) {
            y = 0;
            vy = 0;
            grounded = true;
            player.src = `${jumpAsset}${runFrame ? 'jump-run-b.png' : 'jump-run-a.png'}`;
          }
        } else {
          runFrame = Math.floor(now / 130) % 2;
          player.src = `${jumpAsset}${runFrame ? 'jump-run-b.png' : 'jump-run-a.png'}`;
        }
        player.style.bottom = `${groundBottom + y}px`;
        player.style.transform = grounded ? 'scale(1)' : `scale(${1 + Math.min(y, 160) / 1300})`;

        if (spawnClock > spawnGap) {
          spawnClock = 0;
          spawnGap = 760 + Math.random() * Math.max(160, 560 - distance * 0.55);
          spawnObstacle();
        }

        const p = playerBounds();
        obstacleNodes = obstacleNodes.filter(node => {
          const x = Number(node.dataset.x) - delta * speed;
          node.dataset.x = String(x);
          node.style.left = `${x}px`;
          const w = node.getBoundingClientRect().width;
          const overlap = x < p.right && x + w > p.left;
          const clear = Number(node.dataset.clear);
          if (overlap && node.dataset.hit === 'false' && y < clear) {
            node.dataset.hit = 'true';
            life -= 1;
            pulseArena(arena, 'miss-shake', 300);
            floatText(arena, 'HIT', 44, 42, 'bad');
            setStatus(`HIT。必要高度 ${clear} / 現在 ${Math.floor(y)}`);
            if (life <= 0) {
              setHud();
              window.setTimeout(() => finish('MISS'), 420);
            }
          }
          if (x + w < p.left && node.dataset.passed === 'false' && node.dataset.hit === 'false') {
            node.dataset.passed = 'true';
            floatText(arena, 'CLEAR', 46, 42, 'good');
          }
          if (x + w < -80) {
            node.remove();
            return false;
          }
          return true;
        });

        setHud();
        if (distance >= finishDistance) {
          setStatus('完走。リザルトへ。');
          window.setTimeout(() => finish(), 360);
          return;
        }
        tickTimer = window.setTimeout(() => tick(performance.now()), 16);
      }

      arena.addEventListener('pointerdown', startPress);
      window.addEventListener('pointerup', endPress);
      window.addEventListener('pointercancel', endPress);
      setHud();
      showLessonStart(arena, 'JUMP!', game.name, () => {
        active = true;
        last = performance.now();
        tickTimer = window.setTimeout(() => tick(performance.now()), 16);
      });
      cleanupGame = () => {
        active = false;
        ended = true;
        clearTimeout(tickTimer);
        window.removeEventListener('pointerup', endPress);
        window.removeEventListener('pointercancel', endPress);
        obstacleNodes.forEach(node => node.remove());
      };
    }

    function startReflex() {
      const game = GAMES.reflex;
      document.getElementById('playView').innerHTML = `
        <div class="play-layout">
          <section id="dojoArena" class="arena dojo-stage">
            ${stageNav()}
            ${coachBadge(game)}
            <div class="dojo-flash"></div>
            <div class="slash-effect"></div>
            <div id="dojoCall" class="dojo-call">構えて!!</div>
            <img id="fighter" class="fighter ready" src="${SPRITE}idol-ready.png" alt="" />
            ${renderHud(game.name, [
              { label: 'LEVEL', id: 'reflexLevel', value: '1' },
              { label: 'TIME', id: 'reflexTime', value: '-' },
              { label: 'WIN', id: 'reflexWins', value: '0' },
              { label: 'LIMIT', id: 'reflexLimit', value: '485 ms' }
            ], '合図が出た瞬間に、道場をタップ。', game.assets)}
          </section>
        </div>
      `;
      const arena = document.getElementById('dojoArena');
      const call = document.getElementById('dojoCall');
      const fighter = document.getElementById('fighter');
      let level = 1;
      let wins = 0;
      let misses = 0;
      let canStrike = false;
      let waiting = false;
      let startedAt = 0;
      let timeout = 0;
      let locked = false;
      let ended = false;

      function setFighter(state, src) {
        fighter.className = `fighter ${state}`;
        fighter.src = `${SPRITE}${src}`;
      }

      function setStatus(text) {
        document.getElementById('gameStatus').textContent = text;
      }

      function setHud(ms = '-') {
        const limit = Math.max(175, 520 - level * 35);
        document.getElementById('reflexLevel').textContent = level;
        document.getElementById('reflexWins').textContent = wins;
        document.getElementById('reflexLimit').textContent = `${Math.round(limit)} ms`;
        document.getElementById('reflexTime').textContent = ms;
      }

      function prepareRound() {
        if (ended) return;
        clearTimeout(timeout);
        locked = false;
        waiting = true;
        canStrike = false;
        arena.classList.remove('cue', 'slash-now');
        call.textContent = '構えて!!';
        setFighter('ready', 'idol-ready.png');
        setStatus('まだ動かない。合図を待つ。');
        const wait = 850 + Math.random() * Math.max(420, 1800 - level * 120);
        timeout = setTimeout(() => {
          canStrike = true;
          startedAt = performance.now();
          call.textContent = '打て!';
          pulseArena(arena, 'cue', 520);
          setStatus('今。画面をタップ。');
        }, wait);
      }

      function resolveTap(event) {
        if (event.target.closest('[data-action]')) return;
        if (ended) return;
        if (locked) {
          prepareRound();
          return;
        }
        if (!waiting) {
          prepareRound();
          return;
        }
        if (!canStrike) {
          clearTimeout(timeout);
          waiting = false;
          locked = true;
          misses += 1;
          level = Math.max(1, level - 1);
          call.textContent = '早すぎ!';
          setFighter('hurt', 'idol-hurt.png');
          setStatus(`合図前に動いた。MISS ${misses}/3`);
          pulseArena(arena, 'miss-shake', 260);
          floatText(arena, 'FAST', 50, 42, 'bad');
          setHud('-');
          if (misses >= 3) window.setTimeout(() => finishReflex('MISS'), 520);
          return;
        }
        const ms = performance.now() - startedAt;
        const limit = Math.max(175, 520 - level * 35);
        waiting = false;
        canStrike = false;
        locked = true;
        if (ms <= limit) {
          wins += 1;
          level += 1;
          call.textContent = '勝利!';
          setFighter('strike', 'idol-strike.png');
          pulseArena(arena, 'slash-now', 420);
          saveScore('reflex', wins);
          floatText(arena, `${Math.round(ms)}ms`, 50, 42, 'good');
          setTimeout(() => {
            if (locked) setFighter('win', 'idol-win.png');
          }, 260);
          setStatus(wins >= 5 ? '5勝達成。リザルトへ。' : '成功。次は少しシビア。もう一度タップで再開。');
          if (wins >= 5) window.setTimeout(() => finishReflex(), 720);
        } else {
          misses += 1;
          level = Math.max(1, level - 1);
          call.textContent = '遅い!';
          setFighter('hurt', 'idol-hurt.png');
          setStatus(`間に合わなかった。MISS ${misses}/3`);
          pulseArena(arena, 'miss-shake', 260);
          floatText(arena, 'SLOW', 50, 42, 'bad');
          if (misses >= 3) window.setTimeout(() => finishReflex('MISS'), 520);
        }
        setHud(`${Math.round(ms)} ms`);
      }

      function finishReflex(forceRank = '') {
        if (ended) return;
        ended = true;
        clearTimeout(timeout);
        waiting = false;
        canStrike = false;
        locked = true;
        const rank = forceRank || rankByScore(wins, { perfect: 5, great: 4, good: 2 });
        saveScore('reflex', wins);
        const today = recordPlay('reflex', wins, rank);
        showResult(arena, {
          gameKey: 'reflex',
          rank,
          sprite: game.chibi,
          lines: [`WIN ${wins}`, `MISS ${misses}`, `TODAY BEST ${today.best}`, `LEVEL ${level}`]
        });
      }

      setHud();
      arena.addEventListener('pointerdown', resolveTap);
      showLessonStart(arena, 'READY?', game.name, prepareRound);
      cleanupGame = () => {
        ended = true;
        clearTimeout(timeout);
      };
    }

    function startMemory() {
      const game = GAMES.memory;
      const orb = {
        red: `${SPRITE}orb-red.png`,
        blue: `${SPRITE}orb-blue.png`,
        green: `${SPRITE}orb-green.png`,
        yellow: `${SPRITE}orb-yellow.png`
      };
      document.getElementById('playView').innerHTML = `
        <div class="play-layout">
          <section id="memoryArena" class="arena memory-stage">
            ${stageNav()}
            ${coachBadge(game)}
            <div class="light-rig">
              <span class="stage-light" style="--orb: url('${orb.red}')" data-light="red"></span>
              <span class="stage-light" style="--orb: url('${orb.blue}')" data-light="blue"></span>
              <span class="stage-light" style="--orb: url('${orb.green}')" data-light="green"></span>
              <span class="stage-light" style="--orb: url('${orb.yellow}')" data-light="yellow"></span>
            </div>
            <img class="memory-idol" src="${SPRITE}idol-memory.png" alt="" />
            <div id="stream" class="stream"></div>
            <div>
              <div id="memoryHistory" class="sequence-history"></div>
              <div class="color-pad-row">
                <div class="color-pad" style="--orb: url('${orb.red}')" data-color="red"></div>
                <div class="color-pad" style="--orb: url('${orb.blue}')" data-color="blue"></div>
                <div class="color-pad" style="--orb: url('${orb.green}')" data-color="green"></div>
                <div class="color-pad" style="--orb: url('${orb.yellow}')" data-color="yellow"></div>
              </div>
            </div>
            ${renderHud(game.name, [
              { label: 'ROUND', id: 'memoryRound', value: '1' },
              { label: 'SCORE', id: 'memoryScore', value: '0' },
              { label: 'LENGTH', id: 'memoryLength', value: '3' },
              { label: 'INPUT', id: 'memoryInput', value: '0' }
            ], '流れる色を覚える。', game.assets)}
          </section>
        </div>
      `;
      const colors = Object.keys(orb);
      const stream = document.getElementById('stream');
      const history = document.getElementById('memoryHistory');
      const pads = [...document.querySelectorAll('.color-pad')];
      const arena = document.getElementById('memoryArena');
      const lights = Object.fromEntries([...document.querySelectorAll('[data-light]')].map(light => [light.dataset.light, light]));
      let round = 1;
      let score = 0;
      let misses = 0;
      let sequence = [];
      let input = [];
      let showing = false;
      let ended = false;
      let timers = [];

      function setStatus(text) {
        document.getElementById('gameStatus').textContent = text;
      }

      function renderInput() {
        history.innerHTML = '';
        input.forEach(color => {
          const dot = document.createElement('span');
          dot.className = 'history-dot';
          dot.style.setProperty('--orb', `url('${orb[color]}')`);
          history.appendChild(dot);
        });
        document.getElementById('memoryInput').textContent = input.length;
      }

      function setHud() {
        document.getElementById('memoryRound').textContent = round;
        document.getElementById('memoryScore').textContent = score;
        document.getElementById('memoryLength').textContent = round + 2;
        document.getElementById('memoryInput').textContent = input.length;
      }

      function showSequence() {
        if (ended) return;
        timers.forEach(clearTimeout);
        timers = [];
        input = [];
        renderInput();
        setHud();
        sequence = Array.from({ length: round + 2 }, () => colors[Math.floor(Math.random() * colors.length)]);
        showing = true;
        arena.classList.remove('inputting');
        arena.classList.add('listening');
        stream.innerHTML = '';
        setStatus('憶えて。色が右から左へ流れます。');
        sequence.forEach((color, index) => {
          timers.push(setTimeout(() => {
            lights[color]?.classList.add('lit');
            const img = document.createElement('img');
            img.className = 'memory-dot';
            img.src = orb[color];
            stream.appendChild(img);
            timers.push(setTimeout(() => lights[color]?.classList.remove('lit'), 360));
            timers.push(setTimeout(() => img.remove(), 980));
          }, index * 650));
        });
        timers.push(setTimeout(() => {
          showing = false;
          arena.classList.remove('listening');
          arena.classList.add('inputting');
          setStatus('同じ順番で色をタップ。必要数で自動判定。');
        }, sequence.length * 650 + 280));
      }

      function judgeIfReady() {
        if (input.length < sequence.length) return;
        const ok = sequence.every((color, index) => color === input[index]);
        showing = true;
        if (ok) {
          score += 1;
          round += 1;
          saveScore('memory', score);
          pulseArena(arena, 'combo-pulse');
          floatText(arena, 'OK', 50, 46, 'good');
          setStatus('正解。次のラウンドへ。');
          if (score >= 5) {
            timers.push(setTimeout(() => finishMemory(), 720));
            return;
          }
        } else {
          misses += 1;
          round = Math.max(1, round - 1);
          pulseArena(arena, 'miss-shake', 260);
          floatText(arena, 'MISS', 50, 46, 'bad');
          setStatus(`不正解。MISS ${misses}/3`);
          if (misses >= 3) {
            timers.push(setTimeout(() => finishMemory('MISS'), 720));
            return;
          }
        }
        setHud();
        timers.push(setTimeout(showSequence, 1250));
      }

      function finishMemory(forceRank = '') {
        if (ended) return;
        ended = true;
        timers.forEach(clearTimeout);
        showing = true;
        const rank = forceRank || rankByScore(score, { perfect: 5, great: 4, good: 2 });
        saveScore('memory', score);
        const today = recordPlay('memory', score, rank);
        showResult(arena, {
          gameKey: 'memory',
          rank,
          sprite: game.chibi,
          lines: [`SCORE ${score}`, `MISS ${misses}`, `TODAY BEST ${today.best}`, `ROUND ${round}`]
        });
      }

      pads.forEach(pad => {
        pad.addEventListener('pointerdown', event => {
          event.preventDefault();
          if (ended || showing || !sequence.length) return;
          const color = pad.dataset.color;
          pad.classList.add('hit');
          lights[color]?.classList.add('lit');
          setTimeout(() => pad.classList.remove('hit'), 150);
          setTimeout(() => lights[color]?.classList.remove('lit'), 180);
          input.push(color);
          renderInput();
          judgeIfReady();
        });
      });

      setHud();
      showLessonStart(arena, 'REMEMBER!', game.name, showSequence);
      cleanupGame = () => {
        ended = true;
        timers.forEach(clearTimeout);
      };
    }

    document.addEventListener('click', event => {
      const select = event.target.closest('[data-select-game]');
      if (select) {
        selectedGame = select.dataset.selectGame;
        startSelectedGame();
        return;
      }
      const idea = event.target.closest('[data-select-idea]');
      if (idea) {
        showIdea(idea.dataset.selectIdea);
        return;
      }
      const action = event.target.closest('[data-action]')?.dataset.action;
      if (!action) return;
      if (action === 'start') startSelectedGame();
      if (action === 'howto') showHowto();
      if (action === 'select') showSelect();
      if (action === 'lobby') showSelect();
      if (action === 'restart') restartGame();
    });
    updateGameCards();
  </script>
</body>
</html>
