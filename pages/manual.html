<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>装置操作マニュアル | NV center training</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23ffe066'/%3E%3Ccircle cx='12' cy='16' r='5' fill='%232d6cdf'/%3E%3Ccircle cx='21' cy='16' r='5' fill='none' stroke='%23202124' stroke-width='3'/%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #5f6368;
      --line: #d8dfe8;
      --yellow: #ffe066;
      --blue: #2d6cdf;
      --cyan: #69d2ff;
      --game-pink: #ff4fb3;
      --game-orange: #ff9d3d;
      --game-yellow: #ffe25c;
      --game-cyan: #35c7ff;
      --game-blue: #4f7dff;
      --game-violet: #8c6bff;
      --game-navy: #24304f;
      --game-shadow: 0 18px 48px rgba(53, 86, 166, 0.18), 0 8px 18px rgba(53, 199, 255, 0.10);
      font-family: "Segoe UI", "Yu Gothic UI", "Hiragino Sans", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 12%, rgba(53, 199, 255, 0.38), transparent 30%),
        radial-gradient(circle at 90% 20%, rgba(255, 226, 92, 0.34), transparent 28%),
        radial-gradient(circle at 78% 88%, rgba(140, 107, 255, 0.16), transparent 30%),
        linear-gradient(135deg, #f5fbff 0%, #fff 48%, #fff8e3 100%);
    }

    .shell {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 42px;
      display: grid;
      gap: 18px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .kicker {
      width: fit-content;
      margin: 0 0 8px;
      padding: 5px 10px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--game-blue), var(--game-cyan));
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(79, 125, 255, 0.22);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 7vw, 64px);
      line-height: 0.96;
      color: var(--game-navy);
      text-shadow: 3px 3px 0 rgba(255, 226, 92, 0.95), 6px 6px 0 rgba(53, 199, 255, 0.18);
      letter-spacing: 0;
    }

    .lead {
      margin: 10px 0 0;
      max-width: 780px;
      color: #485465;
      font-weight: 700;
      line-height: 1.7;
      display: none;
    }

    .nav,
    .equipment-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    a.button,
    button {
      min-height: 40px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(79, 125, 255, 0.28);
      border-radius: 8px;
      background: linear-gradient(135deg, #ffffff, #eef8ff);
      color: var(--game-blue);
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(79, 125, 255, 0.16);
    }

    button.active {
      background: linear-gradient(135deg, var(--game-yellow), #fff2a6);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255, 157, 61, 0.18);
    }

    .layout {
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 16px;
    }

    .coach,
    .panel {
      border: 1px solid rgba(79, 125, 255, 0.24);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.84));
      box-shadow: var(--game-shadow);
    }

    .coach {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 10px;
      padding: 18px;
      text-align: center;
    }

    .coach img {
      width: min(170px, 80%);
      aspect-ratio: 1;
      object-fit: contain;
      filter: drop-shadow(0 12px 16px rgba(0,0,0,0.18));
    }

    .coach p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      font-weight: 700;
    }

    .panel {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .manual-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .manual-head h2 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
    }

    .tag {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border: 1px solid rgba(79, 125, 255, 0.28);
      border-radius: 999px;
      background: linear-gradient(135deg, #eef7ff, #ffffff);
      font-weight: 900;
      white-space: nowrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      min-height: 150px;
      padding: 12px;
      border: 1px solid rgba(79, 125, 255, 0.18);
      border-radius: 10px;
      background: linear-gradient(180deg, #ffffff, #fbfdff);
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .card ul {
      margin: 0;
      padding-left: 18px;
      color: #4a5565;
      line-height: 1.65;
      font-weight: 700;
    }

    .note {
      padding: 12px;
      border: 1px solid rgba(255, 157, 61, 0.26);
      border-radius: 10px;
      background: linear-gradient(135deg, #fffdf1, #f2fbff);
      color: #5a4b10;
      font-weight: 800;
      line-height: 1.65;
    }


    .manual-detail[hidden] {
      display: none;
    }

    .manual-detail {
      padding-top: 4px;
      border-top: 1px solid var(--line);
    }

    .manual-doc {
      display: grid;
      gap: 10px;
      color: #344054;
      line-height: 1.75;
      font-weight: 700;
    }

    .manual-doc h3,
    .manual-doc h4,
    .manual-doc p,
    .manual-doc ul,
    .manual-doc figure,
    .manual-doc aside {
      margin: 0;
    }

    .manual-doc h3 {
      margin-top: 10px;
      padding-top: 12px;
      border-top: 1px solid rgba(79, 125, 255, 0.18);
      color: var(--game-navy);
      font-size: 22px;
      line-height: 1.35;
    }

    .manual-doc h3:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .manual-doc h4 {
      margin-top: 6px;
      color: #1f4fbf;
      font-size: 18px;
      line-height: 1.45;
    }

    .manual-subtitle {
      color: #42526b;
      font-size: 15px;
    }

    .manual-small,
    .manual-caption,
    .manual-write-line {
      color: var(--muted);
      font-size: 13px;
    }

    .manual-bullets,
    .manual-checklist {
      padding-left: 20px;
      display: grid;
      gap: 4px;
    }

    .manual-bullets-sub {
      margin-left: 14px;
      color: #526071;
    }

    .manual-checklist {
      padding-left: 0;
      list-style: none;
    }

    .manual-checklist li::before {
      content: "□";
      margin-right: 8px;
      color: var(--game-blue);
      font-weight: 900;
    }

    .manual-purpose {
      padding: 10px 12px;
      border-left: 4px solid var(--game-blue);
      background: #f5fbff;
    }

    .manual-caution {
      padding: 10px 12px;
      border-left: 4px solid var(--game-orange);
      background: #fff8e5;
      color: #6a4a00;
      font-weight: 900;
    }

    .manual-note-label {
      margin-top: 4px;
      color: var(--game-navy);
      font-weight: 900;
    }

    .manual-write-line {
      overflow-wrap: anywhere;
      letter-spacing: 0;
    }

    .manual-figure {
      display: grid;
      justify-items: center;
      padding: 8px 0 2px;
    }

    .manual-figure img {
      width: min(100%, 720px);
      max-height: 520px;
      object-fit: contain;
      border: 1px solid rgba(79, 125, 255, 0.18);
      border-radius: 8px;
      background: #fff;
    }


    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      padding: 10px 12px;
      border: 1px solid rgba(79, 125, 255, 0.32);
      border-radius: 8px;
      background: #fff;
      font: inherit;
      line-height: 1.5;
    }

    @media (max-width: 820px) {
      header,
      .layout,
      .cards {
        grid-template-columns: 1fr;
      }

      header,
      .manual-head {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <p class="kicker">EQUIPMENT TRAINING</p>
        <h1>装置操作マニュアル</h1>
        <p class="lead">ここは正式な安全手順書ではなく、研究ノート用の入口です。実際の操作は必ず研究室のSOP、管理者の指示、装置予約ルールに従ってください。</p>
      </div>
      <nav class="nav" aria-label="navigation">
        <a class="button" href="../index.html">タイトルへ</a>
      </nav>
    </header>

    <div class="equipment-list" aria-label="equipment list">
      <button type="button" data-device="EBEP" class="active">EBEP</button>
      <button type="button" data-device="パルスバイアスセット">パルスバイアスセット</button>
      <button type="button" data-device="レーザー顕微鏡">レーザー顕微鏡</button>
      <button type="button" data-device="ラマン顕微鏡">ラマン顕微鏡</button>
      <button type="button" data-device="ODMR">ODMR</button>
    </div>

    <section class="layout">
      <aside class="coach">
        <img src="../assets/chibis/mio-manual.png" alt="黒瀬ミオのミニキャラ" />
        <strong>黒瀬ミオ</strong>
        <p>装置の確認項目を落ち着いて整理する担当です。</p>
      </aside>
      <main class="panel">
        <div class="manual-head">
          <div>
            <h2 id="deviceName">EBEP</h2>
            <p id="deviceSummary" class="lead"></p>
          </div>
          <span id="deviceTag" class="tag">electron beam</span>
        </div>
        <div class="cards">
          <article class="card">
            <h3>目的</h3>
            <ul id="purpose"></ul>
          </article>
          <article class="card">
            <h3>使う前</h3>
            <ul id="before"></ul>
          </article>
          <article class="card">
            <h3>基本の流れ</h3>
            <ul id="steps"></ul>
          </article>
          <article class="card">
            <h3>記録する値</h3>
            <ul id="record"></ul>
          </article>
        </div>
        <div id="note" class="note"></div>
        <section id="deviceDetail" class="manual-detail" hidden></section>
        <label>
          自分用メモ
          <textarea id="manualMemo" placeholder="装置担当者から聞いた注意、試料名、測定条件など"></textarea>
        </label>
      </main>
    </section>
  </div>
  <template id="pulseBiasManualTemplate">
    <div class="manual-doc">
      <h3>低エネルギー電子照射<br>操作マニュアル</h3>
      <p class="manual-subtitle">SG-4104・Matsusadaプローブアンプ・HIOKI・10 kΩ箱によるパルスバイアスセット手順</p>
      <p class="manual-small">加筆しやすいように、表は使わず、箇条書き中心で整理</p>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-01.png" alt="パルスバイアスセット参考画像 1" loading="lazy" />
      </figure>
      <p class="manual-caption">図1　最初に見る全体ブロック線図。電気の流れと電子の通り道を分けて見る。</p>
      <h3>0. このマニュアルの流れ</h3>
      <ul class="manual-bullets">
        <li>まず、装置同士がどうつながるかをブロック線図で確認する。</li>
        <li>次に、装置一つ一つの役割を確認する。</li>
        <li>SG-4104、Matsusadaプローブアンプ、HIOKI、抵抗、試料ホルダーは「パルスバイアスセット」としてまとめて確認する。</li>
        <li>その後、「波形だけ確認する場合」「プローブアンプ出力を確認する場合」「金属ダミーで試す場合」「ダイヤモンド本番の場合」に分けて操作する。</li>
        <li>最後に、注意事項、止める条件、トラブル時の確認点を見る。</li>
      </ul>
      <aside class="manual-caution">注意：最初は必ずプラズマOFF、LaB6 OFF、メッシュ電圧OFFで確認する。</aside>
      <p class="manual-note-label">追記欄：</p>
      <p class="manual-write-line">＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿</p>
      <p class="manual-write-line">＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿＿</p>
      <h3>1. 装置接続のブロック線図</h3>
      <p>このページでは、どの装置がどこにつながるかだけを確認します。細かい操作は後の章で分けて説明します。</p>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-02.png" alt="パルスバイアスセット参考画像 2" loading="lazy" />
      </figure>
      <p class="manual-caption">図2　電気接続とプラズマ配置の全体図。</p>
      <ul class="manual-bullets">
        <li>SG-4104は、100 ms ON / 900 ms OFF の波を作る。</li>
        <li>Matsusadaプローブアンプは、SG-4104の小さい信号を大きくして試料側に出す。</li>
        <li>抵抗は、電流が流れすぎないようにする安全部品。</li>
        <li>HIOKIは、試料電圧や抵抗に出た電圧を見る装置。電圧を出す装置ではない。</li>
        <li>試料ホルダーは、金属ダミーまたはダイヤモンドを置く台。</li>
        <li>チャンバーGNDは0 Vの基準。戻り道として必要。</li>
        <li>パルスバイアスセットは、試料側へ正パルスを入れ、HIOKIで試料電圧と抵抗電圧を記録する確認単位として扱う。</li>
      </ul>
      <h3>2. 装置一つ一つの解説</h3>
      <h4>2-1. SG-4104：波を作る箱</h4>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-03.jpg" alt="パルスバイアスセット参考画像 3" loading="lazy" />
      </figure>
      <p class="manual-caption">写真1　SG-4104。OUTPUTからMatsusadaのVcon-inへ入れる。</p>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-04.jpg" alt="パルスバイアスセット参考画像 4" loading="lazy" />
      </figure>
      <p class="manual-caption">写真2　SG-4104の設定例。3番のパルス波、1.00 Hz。</p>
      <ul class="manual-bullets">
        <li>役割は、ON/OFFのリズムを作ること。</li>
        <li>使う波形は、3番のパルス波。</li>
        <li>使うモードはCONT。GATE、TRIG、MANは使わない。</li>
        <li>周波数は1.00 Hz。</li>
        <li>Dutyは10%。これでON 100 ms、OFF 900 msになる。</li>
        <li>SG-4104の電圧は、そのまま試料電圧ではない。プローブアンプで約12倍される。</li>
      </ul>
      <ul class="manual-bullets manual-bullets-sub">
        <li>試料側を0〜+3 Vにしたい場合、SG-4104側は0〜+0.25 V程度にする。</li>
        <li>試料側を0〜+5 Vにしたい場合、SG-4104側は0〜+0.42 V程度にする。</li>
        <li>最初は200 mV程度から始め、HIOKIで実際の出力を確認する。</li>
      </ul>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-05.jpg" alt="パルスバイアスセット参考画像 5" loading="lazy" />
      </figure>
      <p class="manual-caption">写真3　SG-4104が200 mV表示の例。約12倍後はおよそ2.4 V。</p>
      <h4>2-2. Matsusadaプローブアンプ：電圧を強くする箱</h4>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-06.jpg" alt="パルスバイアスセット参考画像 6" loading="lazy" />
      </figure>
      <p class="manual-caption">写真4　Matsusadaプローブアンプ。Vcon-in、OUTPUT、CV/CC、BIASを確認する。</p>
      <ul class="manual-bullets">
        <li>役割は、SG-4104の小さい波を試料にかけられる電圧にすること。</li>
        <li>SG-4104のOUTPUTを、プローブアンプのVcon-inへ入れる。</li>
        <li>プローブアンプの出力+を、抵抗を通して試料ホルダーへつなぐ。</li>
        <li>プローブアンプの出力−を、チャンバーGNDへつなぐ。</li>
        <li>写真の表示が0.00 Vの場合、出力が出ていない、または入力が反映されていない可能性がある。</li>
      </ul>
      <ul class="manual-bullets manual-bullets-sub">
        <li>OUTPUTを押しても反応しない場合は、まず試料を外して、プローブアンプ出力+/-だけを測る。</li>
        <li>BIASつまみで手動出力できるか確認すると、プローブアンプ本体の問題か、Vcon-in側の問題かを分けられる。</li>
      </ul>
      <h4>2-3. HIOKI LR8431：波を見る箱</h4>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-07.jpg" alt="パルスバイアスセット参考画像 7" loading="lazy" />
      </figure>
      <p class="manual-caption">写真5　HIOKI LR8431。電圧波形の確認と記録に使う。</p>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-08.jpg" alt="パルスバイアスセット参考画像 8" loading="lazy" />
      </figure>
      <p class="manual-caption">写真6　HIOKIの測定画面。緑や赤の波形で電圧変化を見る。</p>
      <ul class="manual-bullets">
        <li>HIOKIは電圧の変化を見る装置。電流を直接見る装置ではない。</li>
        <li>試料ホルダー電圧を見るときは、CH+を試料ホルダー、CH−をGNDにつなぐ。</li>
        <li>抵抗にかかった電圧を見るときは、抵抗の両端をHIOKIで見る。</li>
        <li>電流は、抵抗にかかった電圧を抵抗値で割って計算する。</li>
        <li>画面の「表示上限」「表示下限」は、表示スケール。実際にその電圧が出ているという意味ではない。</li>
      </ul>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-09.jpg" alt="パルスバイアスセット参考画像 9" loading="lazy" />
      </figure>
      <p class="manual-caption">写真7　表示スケールを見ている例。スケール値と実測値を混同しない。</p>
      <h4>2-4. 10 kΩ箱・抵抗：電流止め</h4>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-10.jpg" alt="パルスバイアスセット参考画像 10" loading="lazy" />
      </figure>
      <p class="manual-caption">写真8　10 kΩ箱。使う前にテスターで抵抗値を確認する。</p>
      <ul class="manual-bullets">
        <li>抵抗は、電流が流れすぎないようにする安全部品。</li>
        <li>今回の10 kΩ箱は、10 kΩとして使える可能性がある。まずテスターで確認する。</li>
        <li>抵抗が10 kΩで、そこに1 V出たら、電流は100 µA。</li>
        <li>抵抗が10 kΩで、そこに10 V出たら、電流は1 mA。</li>
        <li>抵抗が10 kΩで、そこに100 V出たら、電流は10 mA。</li>
      </ul>
      <aside class="manual-caution">注意：10 kΩは最初の安全確認には少し小さい。1 MΩが用意できるなら、最初は1 MΩから始める。</aside>
      <h4>2-5. 試料ホルダー：金属ダミーまたはダイヤモンドを置く台</h4>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-11.png" alt="パルスバイアスセット参考画像 11" loading="lazy" />
      </figure>
      <p class="manual-caption">写真9　試料ホルダー先端の構造イメージ。前面は1×1 mmだけ露出させる。</p>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-12.png" alt="パルスバイアスセット参考画像 12" loading="lazy" />
      </figure>
      <p class="manual-caption">図3　金属ダミーとダイヤモンドで何が違うか。</p>
      <ul class="manual-bullets">
        <li>最初は金属ダミーを使う。金属ダミーは電子がその位置まで来ているかを見るための上限チェック。</li>
        <li>ダイヤモンドは絶縁体なので、金属ダミーと同じように電流が流れるとは限らない。</li>
        <li>前面に見せるのは1×1 mmの試料面だけ。周囲に銅端子や大きな金属面を出さない。</li>
        <li>銅は前面に出さない。過去に赤熱・汚染が起きたため、前面材料はMoまたはSUSを基本にする。</li>
      </ul>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-13.png" alt="パルスバイアスセット参考画像 13" loading="lazy" />
      </figure>
      <p class="manual-caption">図4　金属板と線を安定してつなぐ考え方。接着剤だけで導通を作らない。</p>

      <h4>2-6. パルスバイアスセット：正パルスを試料へ入れる一式</h4>
      <ul class="manual-bullets">
        <li>SG-4104、Matsusadaプローブアンプ、HIOKI、電流制限抵抗、試料ホルダー、チャンバーGNDを一つのセットとして確認する。</li>
        <li>目的は、電子照射中の試料側へ0 V〜+3〜+5 V程度の正パルスを入れ、ON/OFFと抵抗電圧を記録すること。</li>
        <li>標準の入口条件は、1.00 Hz、Duty 10%、ON 100 ms、OFF 900 ms。最初は0〜+3 Vから確認する。</li>
        <li>BIASつまみは本体単体の切り分け確認に使う。本番条件ではVcon-inからのパルス入力を基本にする。</li>
        <li>HIOKIは、試料ホルダー電圧を必ず見る。チャンネルに余裕があれば、抵抗両端の電圧も同時に見る。</li>
        <li>電流は、抵抗にかかった電圧を抵抗値で割って換算する。HIOKIの表示スケールを電流と混同しない。</li>
      </ul>
      <aside class="manual-caution">注意：配線変更は、プラズマOFF、LaB6 OFF、メッシュ電圧OFF、Matsusada OUTPUT OFFを確認してから行う。</aside>
      <h3>3. 目標波形と調整の考え方</h3>
      <figure class="manual-figure">
        <img src="../assets/manual/pulse-bias/image-15.png" alt="パルスバイアスセット参考画像 15" loading="lazy" />
      </figure>
      <p class="manual-caption">図6　目標波形。100 msだけON、900 ms休む。</p>
      <ul class="manual-bullets">
        <li>使う波形は、0 Vから+3〜+5 Vへ上がる正パルス。</li>
        <li>負電圧には振らない。</li>
        <li>ON 100 msは、電子を引き寄せる時間。</li>
        <li>OFF 900 msは、帯電と発熱を逃がす時間。</li>
        <li>電流が小さい場合は、電圧を+3 Vから+5 Vへ上げる。</li>
        <li>電流が大きい場合は、電圧を下げるか、ON時間を短くする。</li>
        <li>電流がON直後だけ出てすぐ落ちる場合は、帯電が疑われる。そのときはONを10〜50 msに短くし、OFFを長くする。</li>
      </ul>

        <li>SG-4104、Matsusada、HIOKI、抵抗箱、試料ホルダー、GND線を見える順に並べる。</li>
        <li>SG-4104 OUTPUTからMatsusadaのVcon-inへ入ることを確認する。</li>
        <li>Matsusada出力+から抵抗を通して試料ホルダーへつなぐ。</li>
        <li>Matsusada出力−をチャンバーGNDへ戻す。</li>
        <li>HIOKI CH1は試料ホルダー対GNDを見る。CH2が使える場合は抵抗両端を見る。</li>
        <li>SG-4104は3番パルス波、CONT、1.00 Hz、Duty 10%、0〜+側だけにする。</li>
        <li>Matsusada OUTPUT OFFのまま、導通とショートをテスターで確認する。</li>
        <li>金属ダミーで確認するまでは、ダイヤモンドを接続しない。</li>

      <h3>5. 電流の見方</h3>
      <ul class="manual-bullets">
        <li>HIOKIは電流を直接見ていない。抵抗に出た電圧を見ている。</li>
        <li>電流は「抵抗にかかった電圧 ÷ 抵抗値」で計算する。</li>
        <li>10 kΩ抵抗を使っている場合、0.1 Vは10 µA、1 Vは100 µA、10 Vは1 mA、100 Vは10 mA。</li>
        <li>表示スケールを100にしても、100 Vが出ているという意味ではない。実際の波形の値を見る。</li>
        <li>抵抗の電圧が大きいほど、試料へ流れた電流が大きい。</li>
      </ul>
      <aside class="manual-caution">注意：100 µAを超えたら一度止めて確認する。特にダイヤモンド本番では無理に電流を流さない。</aside>
      <h3>6. 注意事項</h3>
      <ul class="manual-bullets">
        <li>配線作業は、必ずプラズマOFF、LaB6 OFF、メッシュ電圧OFFで行う。</li>
        <li>試料へつなぐ前に、SG-4104単体、プローブアンプ単体、試料ホルダー電圧の順に確認する。</li>
        <li>抵抗なしで試料ホルダーへ直接つながない。</li>
        <li>銅端子を電子が当たる前面に出さない。赤熱・汚染の原因になる。</li>
        <li>HIOKIの表示上限は電流ではない。単位Vの表示スケール。</li>
        <li>電源がCC動作に入ったら、その条件は安定した電圧照射ではない。いったん止める。</li>
        <li>プローブアンプのOUTPUTが反応しない場合は、試料をつながずに本体単体で出力確認する。</li>
        <li>SG-4104の波が負電圧へ振れていないか、必ず確認する。</li>
        <li>ダイヤモンドは絶縁体なので、金属ダミーと同じ電流が流れるとは限らない。</li>
        <li>異常時は、試料バイアス、メッシュ、プラズマの順に安全側へ戻す。</li>
      </ul>
      <h3>7. 異常時の止める条件</h3>
      <ul class="manual-checklist">
        <li>試料ホルダーや金属部が赤く見えた。</li>
        <li>銅色・黒色などの汚染が見えた。</li>
        <li>HIOKIの波形が急に大きくなった。</li>
        <li>試料電圧が設定より大きく落ちた。</li>
        <li>抵抗から換算した電流が100 µAを超えた。</li>
        <li>MatsusadaがCC動作に入った。</li>
        <li>プラズマの発光が急に変化した。</li>
        <li>温度が急に上がった。</li>
        <li>何が起きているか分からなくなった。</li>
      </ul>
      <aside class="manual-caution">注意：迷ったら止める。止めてから配線・表示・抵抗値を確認する。</aside>
      <h3>8. トラブル別の確認</h3>
      <h4>8-1. OUTPUTを押しても反応しない</h4>
      <ul class="manual-bullets">
        <li>SG-4104の波がHIOKIで見えているなら、SG-4104側はだいたいOK。</li>
        <li>次はMatsusadaの出力+/-を直接測る。</li>
        <li>Matsusada出力が0 Vのままなら、Vcon-inが有効か、OUTPUTがONか、保護が働いていないか確認する。</li>
        <li>BIASつまみで手動出力できるか確認すると、本体側の問題か外部入力側の問題か分かれる。</li>
      </ul>
      <h4>8-2. 波形はあるが試料に届いていない</h4>
      <ul class="manual-bullets">
        <li>プローブアンプ出力+から抵抗までの導通を確認する。</li>
        <li>抵抗からフィードスルーまでの導通を確認する。</li>
        <li>フィードスルーから試料ホルダーまでの導通を確認する。</li>
        <li>試料ホルダーがチャンバーGNDにショートしていないか確認する。</li>
      </ul>
      <h4>8-3. 赤波形の縦軸を見やすくしたい</h4>
      <ul class="manual-bullets">
        <li>右側のチャンネル番号で赤のチャンネルを選ぶ。</li>
        <li>赤が小さい場合は、表示上限と表示下限を小さくする。</li>
        <li>例えば赤が-0.02 V程度なら、表示上限0.05 V、表示下限-0.05 Vくらいにする。</li>
        <li>表示スケールを大きくしても電流が増えるわけではない。</li>
      </ul>

  <script>
    const devices = {
      EBEP: {
        tag: 'electron beam',
        summary: '電子照射や電子線処理の条件を整理する入口です。低エネルギー電子ではknock-onより、電子励起・表面近傍キャリア生成・電荷状態変化を中心に記録します。',
        purpose: ['照射エネルギー、電流密度、照射時間を記録する', 'NV形成や発光変化と線量を対応させる'],
        before: ['試料固定、導電性基板、チャージアップ対策を確認する', 'ビーム条件と安全インターロックを確認する', '照射前PL、ラマン、顕微鏡像を残す'],
        steps: ['試料位置合わせ', '低倍率または低電流で照射領域を確認', '本照射条件を設定', '照射後の観測へ進む'],
        record: ['電子エネルギー eV/keV', '電流または電流密度', '照射時間と面積', '推定線量', '照射前後のPL変化'],
        note: '低エネルギー電子では炭素空孔を直接作る説明ではなく、既存欠陥複合体の励起・再構成として整理すると筋が通ります。'
      },
      'パルスバイアスセット': {
        tag: 'pulse bias',
        detailTemplate: 'pulseBiasManualTemplate',
        summary: 'SG-4104、Matsusadaプローブアンプ、HIOKI、電流制限抵抗、試料ホルダーを一つの確認単位として整理する入口です。',
        purpose: ['電子照射中に試料側へ0 Vから+3〜+5 V程度の正パルスを入れる', 'ON/OFFと抵抗電圧を記録し、試料へ届く電圧と換算電流を確認する'],
        before: ['プラズマOFF、LaB6 OFF、メッシュ電圧OFF、Matsusada OUTPUT OFFを確認する', 'SG-4104単体、Matsusada単体、金属ダミーの順に切り分ける', '抵抗値とチャンバーGNDへの戻り道をテスターで確認する'],
        steps: ['SG-4104を3番パルス波、CONT、1.00 Hz、Duty 10%にする', 'SG-4104 OUTPUTをMatsusadaのVcon-inへ入れる', 'Matsusada出力+から抵抗を通して試料ホルダーへつなぎ、出力-をチャンバーGNDへ戻す', 'HIOKIで試料ホルダー電圧を見て、可能なら抵抗両端の電圧も見る', '金属ダミーで0〜+3 Vから確認し、安全なら+5 Vや照射時間を検討する'],
        record: ['SG-4104の周波数、Duty、Amplitude、Offset', 'Matsusada後の最大電圧と最小電圧', '抵抗値と抵抗に出た電圧', '換算電流、ON時間、OFF時間', '赤熱、変色、CC動作、プラズマ発光変化の有無'],
        note: 'これは正式SOPの代替ではなく、研究ノート用の確認入口です。ダイヤモンド本番は金属ダミーで安全と電子到達を確認した条件だけにします。'
      },
      'レーザー顕微鏡': {
        tag: 'optical mapping',
        summary: '試料表面、照射痕、位置合わせ、PL測定候補位置を探すための入口です。',
        purpose: ['照射位置と表面状態を確認する', 'PL測定やラマン測定の座標を決める'],
        before: ['レーザー出力を低めから始める', '対物レンズ、焦点、試料高さを確認する', '焼けや光退色を避ける'],
        steps: ['低倍率で全体確認', '照射領域へ移動', '焦点を合わせる', '画像と座標を保存'],
        record: ['倍率', 'レーザー波長と出力', '露光時間', '試料座標', '観察した特徴'],
        note: '電子照射前後で同じ場所を見られるように、画像ファイル名と座標メモを必ず残します。'
      },
      'ラマン顕微鏡': {
        tag: 'Raman / PL',
        summary: 'ダイヤモンドの結晶性、グラファイト化、応力、発光背景の変化を確認する入口です。',
        purpose: ['ダイヤモンドピークと欠陥由来の変化を比較する', '照射で熱的損傷が出ていないか確認する'],
        before: ['波長、出力、積算時間を確認する', '標準試料で波数校正を確認する', '過度なレーザー加熱を避ける'],
        steps: ['焦点合わせ', '低出力で試し取り', '条件を固定してマップまたは点測定', 'ベースラインとピーク位置を比較'],
        record: ['レーザー波長', '出力', '積算時間', 'ピーク位置', 'ピーク幅', 'PL背景'],
        note: 'NV形成だけでなく、試料が壊れていないことを示すためにもラマンは重要です。'
      },
      ODMR: {
        tag: 'spin readout',
        summary: 'NV中心のスピン共鳴を見て、NVの存在や環境変化を確認する入口です。',
        purpose: ['NV由来のODMRディップを確認する', '磁場、歪み、温度変化の手がかりを得る'],
        before: ['レーザー、マイクロ波、検出器の安全確認', '基準試料または既知NVで動作確認', 'PL強度が十分か確認'],
        steps: ['PLスポット探索', 'マイクロ波周波数掃引', 'ディップ位置とコントラスト確認', '条件を保存して比較'],
        record: ['レーザー出力', 'マイクロ波出力', '掃引範囲', '共鳴周波数', 'コントラスト', '積算時間'],
        note: 'PL増加だけではNV数増加と電荷状態変化を分けにくいので、ODMRは補助証拠として扱います。'
      }
    };

    const memo = document.getElementById('manualMemo');
    const detail = document.getElementById('deviceDetail');
    let current = 'EBEP';


    function renderDetail(data) {
      detail.innerHTML = '';
      if (!data.detailTemplate) {
        detail.hidden = true;
        return;
      }
      const template = document.getElementById(data.detailTemplate);
      if (!template) {
        detail.hidden = true;
        return;
      }
      detail.appendChild(template.content.cloneNode(true));
      detail.hidden = false;
    }

    function fillList(id, items) {
      document.getElementById(id).innerHTML = items.map(item => `<li>${item}</li>`).join('');
    }

    function selectDevice(name) {
      current = name;
      const data = devices[name];
      document.querySelectorAll('[data-device]').forEach(button => button.classList.toggle('active', button.dataset.device === name));
      document.getElementById('deviceName').textContent = name;
      document.getElementById('deviceSummary').textContent = data.summary;
      document.getElementById('deviceTag').textContent = data.tag;
      fillList('purpose', data.purpose);
      fillList('before', data.before);
      fillList('steps', data.steps);
      fillList('record', data.record);
      renderDetail(data);
      document.getElementById('note').textContent = data.note;
      memo.value = localStorage.getItem(`nvDftManualMemo.${name}`) || '';
    }

    document.querySelectorAll('[data-device]').forEach(button => {
      button.addEventListener('click', () => selectDevice(button.dataset.device));
    });
    memo.addEventListener('input', () => {
      localStorage.setItem(`nvDftManualMemo.${current}`, memo.value);
    });
    selectDevice(current);
  </script>
